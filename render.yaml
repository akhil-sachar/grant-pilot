services:
  - type: web
    name: grantpilot-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: true
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: grantpilot-web
          property: host

  - type: web
    name: grantpilot-web
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: GrantPilot
      - key: NEXT_PUBLIC_DEMO_MODE
        value: true
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: grantpilot-api
          property: host

