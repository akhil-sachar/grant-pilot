services:
  - type: web
    name: grantpilot-api
    env: python
    rootDir: backend
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: true
      - key: DEMO_AUTO_RUN
        value: false
      - key: GUILD_AI_ENABLED
        value: true
      - key: OPENUI_ENABLED
        value: true
      - key: CLICKHOUSE_ENABLED
        value: false
      - key: CLICKHOUSE_FALLBACK_ENABLED
        value: true
      - key: SPONSOR_SCAN_ENABLED
        value: true
      - key: SPONSOR_SCAN_INTERVAL_SECONDS
        value: 300
      - key: NOTIFICATION_SCAN_ENABLED
        value: true
      - key: NOTIFICATION_SCAN_INTERVAL_SECONDS
        value: 180
      - key: COMPOSIO_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AGENT_GENERATION_METHOD
        value: auto
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: LANGFUSE_ENABLED
        value: true
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: grantpilot-web
          property: host

  - type: web
    name: grantpilot-web
    env: node
    rootDir: frontend
    plan: free
    healthCheckPath: /
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: GrantPilot
      - key: NEXT_PUBLIC_DEMO_MODE
        value: true
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: grantpilot-api
          property: host
